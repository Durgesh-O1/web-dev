
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>user information</title>
</head>
<body>
    <form action="post">
            <div>
                <label for="username">Enter your Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" autofocus>
            </div>
            <div>
                <input type="radio" id ="male" name="gender" value="male">
                <label for="male">Male</label>
            </div>
            <div>
                <input type="radio" id ="female" name="gender" value="female">
                <label for="female">Female</label>
            </div>
            <div>
                <label for="useremail">Enter your Email</label>
                 <input type="email" id="useremail" name="email" placeholder="Enter your email">
            </div>
            <div>
                <label for="usercity">Enter your City</label>
                <input type="text" id="usercity" name="city" placeholder="Enter your city">
            </div>

            <div>
                <label for="userpincode">enter your pincode</label>
                <input type="text" id="userpincode" name="pincode" placeholder="Enter your pincode">
            </div>
            <div>
                <label for="useraddress">Enter your Address</label>
                <textarea id="useraddress" name="address" rows="4" cols="50" placeholder="Enter your Address"></textarea>
            </div>

            </form>
</body>
</html>
